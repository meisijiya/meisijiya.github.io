<script>
  var mobileBtn = function f() {
    var toggleMenu = document.getElementsByClassName("menu-toggle")[0];
    var mobileMenu = document.getElementById("mobile-menu");
    if (toggleMenu.classList.contains("active")) {
      toggleMenu.classList.remove("active");
      mobileMenu.classList.remove("active");
    } else {
      toggleMenu.classList.add("active");
      mobileMenu.classList.add("active");
    }
  };

  function toggleSearchInput() {
    const inputs = document.querySelectorAll(".nav-search-input");
    const results = document.querySelectorAll(".nav-search-result");
    inputs.forEach((input) => {
      input.classList.toggle("active");
      if (input.classList.contains("active")) input.focus();
    });
    results.forEach((r) => (r.style.display = "none"));
  }

  // 点击外部区域隐藏搜索框和结果容器的函数
  function handleClickOutsideSearch(event) {
    const searchContainers = document.querySelectorAll(".search-container");
    searchContainers.forEach((container) => {
      const searchInput = container.querySelector(".nav-search-input");
      const searchIcon = container.querySelector("a");

      // 如果点击的元素不是搜索输入框或搜索图标，则隐藏搜索框和结果容器
      if (
        !searchInput.contains(event.target) &&
        !searchIcon.contains(event.target)
      ) {
        searchInput.classList.remove("active");
        // 根据输入框ID确定对应的结果容器
        let resultContainer;
        if (searchInput.id === "nav-search-input-mobile") {
          // 移动端结果容器
          resultContainer = document.querySelector(
            ".navbar-mobile .nav-search-result"
          );
        } else {
          // 桌面端结果容器
          resultContainer = document.getElementById(
            "nav-search-result-desktop"
          );
        }

        if (resultContainer) {
          resultContainer.style.display = "none";
          // 保留搜索结果和输入内容，仅隐藏下拉框
        }
      }
    });
  }

  // 添加全局点击事件监听器
  document.addEventListener("click", function (event) {
    handleClickOutsideSearch(event);
  });

  // 新增：搜索功能实现
  let searchData = []; // 全局变量存储搜索数据
  let currentSearchKeyword = ''; // 追踪当前搜索关键字

  // 页面加载完成后获取搜索数据
  document.addEventListener("DOMContentLoaded", function () {
    fetch("/search.xml")
      .then((res) => res.text())
      .then((xmlText) => {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");
        const entries = xml.getElementsByTagName("entry");
        for (let entry of entries) {
          searchData.push({
            title: entry.getElementsByTagName("title")[0]?.textContent || "",
            content:
              entry.getElementsByTagName("content")[0]?.textContent || "",
            url: entry.getElementsByTagName("url")[0]?.textContent || "",
          });
        }
      })
      .catch((err) => {
        console.error("Failed to load search data:", err);
      });
  });

  // 新增：导航搜索方法
  function navSearch(inputElement) {
    const keyword = inputElement.value.trim().toLowerCase();
    // 查找对应的搜索结果容器
    let resultContainer;

    if (inputElement.id === "nav-search-input-desktop") {
      // 桌面端
      resultContainer = document.getElementById("nav-search-result-desktop");
    } else if (inputElement.id === "nav-search-input-mobile") {
      // 移动端
      resultContainer =
        inputElement.parentNode.querySelector(".nav-search-result");
    }

    if (!resultContainer) return;

    resultContainer.innerHTML = "";

    if (!keyword) {
      resultContainer.style.display = "none";
      return;
    }

    // 显示结果容器
    resultContainer.style.display = "block";

    // 过滤搜索数据
    const results = searchData.filter(
      (data) =>
        (data.title && data.title.toLowerCase().includes(keyword)) ||
        (data.content && data.content.toLowerCase().includes(keyword))
    );

    if (results.length === 0) {
      resultContainer.innerHTML =
        '<p class="no-result">没有结果哟，换个关键词试试吧</p>';
      return;
    }

    // 限制显示结果数量
    const maxResults = 10;
    const limitedResults = results.slice(0, maxResults);

    // 构建结果HTML
    const html = limitedResults
      .map((item) => {
        // 提取包含关键字的内容片段
        let contentSnippet = "";
        if (item.content) {
          // 找到包含关键字的内容片段
          const contentLower = item.content.toLowerCase();
          const keywordIndex = contentLower.indexOf(keyword);

          // 提取关键字前后的内容
          const start = Math.max(0, keywordIndex - 3 * keyword.length);
          const end = Math.min(
            item.content.length,
            keywordIndex + 3 * keyword.length
          );
          contentSnippet = item.content.substring(start, end);
        // 高亮关键字
      const keywordRegex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      contentSnippet = contentSnippet.replace(
        keywordRegex,
        "<mark>$1</mark>"
      );
        }

        return `<div class="search-result-item">
  <a href="${item.url}">
    <div>标题：${item.title}</div>
    <div>内容：${contentSnippet}</div>
  </a>
</div>`;
      })
      .join("");
    resultContainer.innerHTML = html;
  }

  // 文章内容关键字高亮功能
  let currentHighlightIndex = -1;
  let highlightCount = 0;

  function highlightPostContent(keyword) {
    const content = document.querySelector('.post-content');
    if (!content) return false;

    content.innerHTML = content.innerHTML.replace(/<\/?mark>/g, '');

    if (!keyword) return false;

    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);

    const escaped = keyword.replace(/[.*+?^${}|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');

    textNodes.forEach(node => {
      if (!regex.test(node.nodeValue)) return;
      regex.lastIndex = 0;
      const fragment = document.createDocumentFragment();
      node.nodeValue.split(regex).forEach((text, i) => {
        if (i % 2 === 1) {
          const mark = document.createElement('mark');
          mark.textContent = text;
          fragment.appendChild(mark);
        } else {
          fragment.appendChild(document.createTextNode(text));
        }
      });
      node.parentNode.replaceChild(fragment, node);
    });

    return true;
  }

  function getHighlights() {
    const content = document.querySelector('.post-content');
    return content ? content.querySelectorAll('mark') : [];
  }

  function scrollToHighlight(index, smooth = true) {
    const highlights = getHighlights();
    if (highlights.length === 0) return;

    if (index < 0) index = highlights.length - 1;
    if (index >= highlights.length) index = 0;

    currentHighlightIndex = index;
    highlights[index].scrollIntoView({
      behavior: smooth ? 'smooth' : 'auto',
      block: 'center'
    });

    updateHighlightCount();
  }

  function updateHighlightCount() {
    const highlights = getHighlights();
    highlightCount = highlights.length;
    const nav = document.getElementById('highlight-nav');
    if (nav) {
      nav.querySelector('.count').textContent = `${currentHighlightIndex + 1}/${highlightCount}`;
      nav.style.display = highlightCount > 0 ? 'flex' : 'none';
    }
  }

  // 修改 navSearch 函数，集成文章内高亮
  const originalNavSearch = navSearch;
  navSearch = function(inputElement) {
    const keyword = inputElement.value.trim().toLowerCase();
    currentSearchKeyword = keyword;
    const resultContainer = inputElement.id === 'nav-search-input-desktop'
      ? document.getElementById('nav-search-result-desktop')
      : inputElement.parentNode.querySelector('.nav-search-result');

    if (!keyword) {
      if (resultContainer) {
        resultContainer.innerHTML = '';
        resultContainer.style.display = 'none';
      }
      highlightPostContent('');
      return;
    }

    // 先执行原有搜索逻辑
    originalNavSearch(inputElement);

    // 仅在文章页执行内容高亮
    if (highlightPostContent(keyword)) {
      updateHighlightCount();
    }
  };

  // 清除搜索的函数
  function clearSearch(btn) {
    const input = btn.parentNode.querySelector('.nav-search-input');
    input.value = '';
    navSearch(input);
    input.focus();
  }
</script>

                <h2 class="text-xl font-bold text-gray-800 mb-4">生成代码</h2>
                <div class="space-y-4">
                    <button id="generateCode" class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                        生成照片墙代码
                    </button>
                    <textarea id="generatedCode" class="w-full h-64 px-3 py-2 border border-gray-300 rounded-lg font-mono text-sm hidden" readonly></textarea>
                    <button id="copyCode" class="w-full px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors hidden">
                        复制代码
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 存储照片的数组
        let photos = [];

        // DOM 元素
        const photoForm = document.getElementById('photoForm');
        const photoList = document.getElementById('photoList');
        const generateCodeBtn = document.getElementById('generateCode');
        const generatedCode = document.getElementById('generatedCode');
        const copyCodeBtn = document.getElementById('copyCode');

        // 添加照片表单提交处理
        photoForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const newPhoto = {
                id: Date.now(), // 使用时间戳作为唯一ID
                src: document.getElementById('photoSrc').value,
                alt: document.getElementById('photoAlt').value,
                title: document.getElementById('photoTitle').value,
                date: document.getElementById('photoDate').value,
                location: document.getElementById('photoLocation').value,
                description: document.getElementById('photoDescription').value
            };
            
            // 添加到照片数组
            photos.push(newPhoto);
            
            // 更新照片列表显示
            updatePhotoList();
            
            // 重置表单
            photoForm.reset();
            
            alert('照片已添加！');
        });

        // 更新照片列表显示
        function updatePhotoList() {
            if (photos.length === 0) {
                photoList.innerHTML = '<p class="text-gray-500 text-center py-4">暂无照片</p>';
                return;
            }
            
            photoList.innerHTML = photos.map(photo => `
                <div class="border border-gray-200 rounded-lg p-4 flex items-start">
                    <img src="${photo.src}" alt="${photo.alt}" class="w-16 h-16 object-cover rounded mr-4">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">${photo.title}</h3>
                        <p class="text-gray-600 text-sm truncate">${photo.alt}</p>
                        <div class="flex justify-end mt-2">
                            <button onclick="removePhoto(${photo.id})" class="text-red-600 hover:text-red-800 text-sm">
                                <i class="fa fa-trash"></i> 删除
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 删除照片
        function removePhoto(id) {
            if (confirm('确定要删除这张照片吗？')) {
                photos = photos.filter(photo => photo.id !== id);
                updatePhotoList();
            }
        }

        // 生成照片墙代码
        generateCodeBtn.addEventListener('click', function() {
            if (photos.length === 0) {
                alert('请先添加一些照片！');
                return;
            }
            
            // 生成照片数据部分
            const photoDataCode = `const photos = [\n${photos.map((photo, index) => `    {
        id: ${index},
        src: "${photo.src}",
        alt: "${photo.alt}",
        title: "${photo.title}",
        date: "${photo.date}",
        location: "${photo.location}",
        description: "${photo.description}"
    }`).join(',\n')}\n];`;
            
            // 生成照片HTML部分
            const photoHTMLCode = photos.map((photo, index) => `            <!-- 照片项 ${index + 1} -->
            <div class="masonry-item photo-container group cursor-pointer" data-index="${index}">
                <div class="relative overflow-hidden rounded-lg shadow-xl">
                    <img src="${photo.src}" alt="${photo.alt}" class="w-full h-auto photo-hover">
                    <div class="absolute inset-0 flex items-end p-4 photo-info glass-effect">
                        <div>
                            <h3 class="text-white font-bold text-xl">${photo.title}</h3>
                            <p class="text-white/90">${photo.alt}</p>
                        </div>
                    </div>
                </div>
            </div>`).join('\n\n');
            
            // 组合完整代码
            const fullCode = `// 照片数据\n${photoDataCode}\n\n// 照片墙HTML\n${photoHTMLCode}`;
            
            // 显示生成的代码
            generatedCode.value = fullCode;
            generatedCode.classList.remove('hidden');
            copyCodeBtn.classList.remove('hidden');
        });

        // 复制代码到剪贴板
        copyCodeBtn.addEventListener('click', function() {
            generatedCode.select();
            document.execCommand('copy');
            alert('代码已复制到剪贴板！');
        });
    </script>
</body>
</html>
